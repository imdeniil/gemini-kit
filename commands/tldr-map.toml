description = "Show code structure (codemaps) using tldr structure"

prompt = """
# 🗺️ TLDR CODE MAP

**Target:** {{args}}

Use `tldr structure` to map symbols, classes, and function signatures. 
If a second argument is provided, use it as the language (e.g., `/tldr-map . php`).

## 🧩 Structure Map
[Run `./scripts/tldr-wrapper.sh structure {{args}}` to see signatures. If args contains a space, the second part is the language, e.g. `structure path --lang lang`]

---

### 🔍 Analysis Levels
- **Functions**: Identify entry points and logic blocks.
- **Classes**: Understand data structures and inheritance.
- **Signatures**: See parameters and return types without implementation noise.

### 💡 Usage Tip
Always run this BEFORE `read_file` for large files to identify exact lines of interest.
"""
