description = "Gather relevant context for a task using tldr context"

prompt = """
# 🧠 TLDR SMART CONTEXT

**Entry Point:** {{args}}

Use `tldr context` to gather relevant files and logic.
You can specify a language as a second argument (e.g., `/tldr-context main python`).

## 📚 Gathered Context
[Run `./scripts/tldr-wrapper.sh context {{args}}` to see relevant logic. If args contains a space, use the second part as --lang]

---

### 🎯 Focus Areas
- **Direct Dependencies**: Files imported by the entry point.
- **Flow Logic**: Key functions in the execution path.
- **Definitions**: Type definitions and shared constants.

### 💡 Efficiency Note
This command is the most token-efficient way to "onboard" onto a specific feature or bug.
"""
